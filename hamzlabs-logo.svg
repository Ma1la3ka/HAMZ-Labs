<svg width="600" height="380" viewBox="0 0 600 380" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Hamz Labs Logo</title>
  <desc>Hamz Labs futuristic tech logo with H-scan identity motif</desc>

  <defs>
    <linearGradient id="gPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="gCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00DFD8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="40%" stop-color="#6366f1" stop-opacity="1"/>
      <stop offset="60%" stop-color="#a855f7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background card -->
  <rect x="0" y="0" width="600" height="380" rx="20" fill="#050508"/>
  <rect x="0" y="0" width="600" height="2" rx="1" fill="url(#gPurple)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="360" x2="600" y2="360"/>
    <line x1="80" y1="0" x2="80" y2="380"/>
    <line x1="160" y1="0" x2="160" y2="380"/>
    <line x1="240" y1="0" x2="240" y2="380"/>
    <line x1="320" y1="0" x2="320" y2="380"/>
    <line x1="400" y1="0" x2="400" y2="380"/>
    <line x1="480" y1="0" x2="480" y2="380"/>
    <line x1="560" y1="0" x2="560" y2="380"/>
  </g>

  <!-- H Scan Frame - top-left bracket -->
  <path d="M108 70 L108 50 L128 50" fill="none" stroke="url(#gPurple)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- top-right bracket -->
  <path d="M192 50 L212 50 L212 70" fill="none" stroke="url(#gPurple)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- bottom-left bracket -->
  <path d="M108 210 L108 230 L128 230" fill="none" stroke="url(#gPurple)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- bottom-right bracket -->
  <path d="M192 230 L212 230 L212 210" fill="none" stroke="url(#gPurple)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- H letterform inside frame -->
  <rect x="120" y="70" width="14" height="120" rx="2" fill="url(#gPurple)" opacity="0.9"/>
  <rect x="186" y="70" width="14" height="120" rx="2" fill="url(#gPurple)" opacity="0.9"/>
  <rect x="120" y="123" width="80" height="14" rx="2" fill="url(#gCyan)" filter="url(#glow)"/>

  <!-- Scan lines inside H -->
  <line x1="134" y1="88" x2="186" y2="88" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
  <line x1="134" y1="100" x2="186" y2="100" stroke="#6366f1" stroke-width="0.8" opacity="0.3"/>
  <line x1="134" y1="112" x2="186" y2="112" stroke="#a855f7" stroke-width="0.8" opacity="0.3"/>
  <line x1="134" y1="147" x2="186" y2="147" stroke="#a855f7" stroke-width="0.8" opacity="0.3"/>
  <line x1="134" y1="159" x2="186" y2="159" stroke="#6366f1" stroke-width="0.8" opacity="0.3"/>
  <line x1="134" y1="171" x2="186" y2="171" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>

  <!-- Biometric pulse dot -->
  <circle cx="160" cy="130" r="5" fill="#00DFD8" opacity="0.9" filter="url(#glow)"/>
  <circle cx="160" cy="130" r="10" fill="none" stroke="#00DFD8" stroke-width="0.8" opacity="0.4"/>
  <circle cx="160" cy="130" r="16" fill="none" stroke="#00DFD8" stroke-width="0.5" opacity="0.2"/>

  <!-- Data readout lines right of mark -->
  <rect x="220" y="118" width="20" height="2" rx="1" fill="#6366f1" opacity="0.6"/>
  <rect x="220" y="124" width="14" height="2" rx="1" fill="#a855f7" opacity="0.4"/>
  <rect x="220" y="130" width="18" height="2" rx="1" fill="#ec4899" opacity="0.5"/>
  <rect x="220" y="136" width="10" height="2" rx="1" fill="#6366f1" opacity="0.3"/>
  <rect x="220" y="142" width="16" height="2" rx="1" fill="#a855f7" opacity="0.4"/>
  <!-- Data readout lines left of mark -->
  <rect x="80" y="118" width="20" height="2" rx="1" fill="#6366f1" opacity="0.6"/>
  <rect x="86" y="124" width="14" height="2" rx="1" fill="#a855f7" opacity="0.4"/>
  <rect x="82" y="130" width="18" height="2" rx="1" fill="#ec4899" opacity="0.5"/>
  <rect x="90" y="136" width="10" height="2" rx="1" fill="#6366f1" opacity="0.3"/>
  <rect x="84" y="142" width="16" height="2" rx="1" fill="#a855f7" opacity="0.4"/>

  <!-- WORDMARK: HAMZ -->
  <text x="400" y="148"
        font-family="'Segoe UI', 'Arial Black', sans-serif"
        font-weight="900"
        font-size="80"
        letter-spacing="-2"
        fill="url(#gPurple)"
        text-anchor="middle"
        dominant-baseline="middle">HAMZ</text>

  <!-- Separator line -->
  <line x1="355" y1="175" x2="445" y2="175" stroke="url(#gLine)" stroke-width="1" opacity="0.7"/>

  <!-- LABS -->
  <text x="400" y="200"
        font-family="'Segoe UI', Arial, sans-serif"
        font-weight="400"
        font-size="18"
        letter-spacing="14"
        fill="#ffffff"
        text-anchor="middle"
        opacity="0.55">LABS</text>

  <!-- Tagline -->
  <text x="300" y="270"
        font-family="'Courier New', monospace"
        font-size="11"
        letter-spacing="3"
        fill="#00DFD8"
        text-anchor="middle"
        opacity="0.65">[ AI · IDENTITY · INNOVATION ]</text>

  <!-- Accent dots -->
  <circle cx="252" cy="300" r="2" fill="#6366f1" opacity="0.5"/>
  <circle cx="264" cy="300" r="2" fill="#a855f7" opacity="0.5"/>
  <circle cx="276" cy="300" r="2" fill="#ec4899" opacity="0.5"/>
  <line x1="286" y1="300" x2="314" y2="300" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="324" cy="300" r="2" fill="#ec4899" opacity="0.5"/>
  <circle cx="336" cy="300" r="2" fill="#a855f7" opacity="0.5"/>
  <circle cx="348" cy="300" r="2" fill="#6366f1" opacity="0.5"/>

  <!-- EST -->
  <text x="300" y="335"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="10"
        letter-spacing="4"
        fill="#ffffff"
        text-anchor="middle"
        opacity="0.2">EST. 2026 · KWARA</text>

</svg>
